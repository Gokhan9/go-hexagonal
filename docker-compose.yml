version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wallet_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wallet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wallet_app
    environment:
      DB_URL: "host=db port=5432 user=postgres password=postgres dbname=wallet_db sslmode=disable"
    depends_on: 
      - db
    ports: 
      - "8080:8080"
volumes:
  pgdata: